<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Dashboard - GARDENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <style>
        :root { 
            --primary: #db2777; 
            --accent: #6366f1; 
            --bg: #f1f5f9; 
            --card-bg: #ffffff; 
            --border-color: #e2e8f0; 
            --text-main: #0f172a; 
            --text-mute: #64748b; 
        }
        
        * { 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        body { 
            background-color: var(--bg); 
            height: 100dvh; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            overflow: hidden; 
            font-size: clamp(12px, 1.2vw, 16px);
        }

        .app-container { 
            width: 100%; 
            max-width: 500px; 
            background: var(--card-bg); 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
        }

        .scrollable-content { 
            flex: 1; 
            overflow-y: auto; 
            padding-bottom: 100px; 
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch;
        }
        
        .scrollable-content::-webkit-scrollbar { display: none; }

        /* Loading Animation Selaras */
        #loading-overlay {
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.8);
            transition: opacity 0.4s ease-in-out;
        }

        .pink-header { 
            background: linear-gradient(135deg, #db2777 0%, #be185d 40%, #6366f1 100%); 
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25); 
            border-radius: 20px; 
            padding: 0.75rem; 
            text-align: center; 
            color: white;
        }

        .rekap-wrapper { 
            width: 100%; 
            overflow-x: hidden; 
            border-radius: 20px; 
            border: 1px solid var(--border-color); 
            background: #fff;
        }
        
        .rekap-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.7rem; 
            table-layout: fixed; 
        }

        .rekap-table th { 
            background: #f8fafc; 
            padding: 12px 8px; 
            text-align: left; 
            border-bottom: 2px solid #e2e8f0; 
            color: #64748b; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
        }

        .rekap-table td { 
            padding: 12px 8px; 
            border-bottom: 1px solid #f1f5f9; 
            color: var(--text-main); 
            font-weight: 600; 
            word-break: break-word; 
        }

        .status-badge { 
            padding: 6px; 
            border-radius: 12px; 
            font-size: 0.6rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            display: inline-block; 
            line-height: 1.5; 
            width: 100%; 
        }

        .badge-present { background: #ecfdf5; color: #10b981; border: 1px solid #d1fae5; }
        .badge-dl { background: #ecfeff; color: #0891b2; border: 1px solid #cffafe; }
        .badge-absent { background: #fff1f2; color: #f43f5e; border: 1px solid #ffe4e6; }

        .search-box {
            background: #f8fafc;
            border: 1.5px solid var(--border-color);
            border-radius: 14px;
            padding: 10px 16px;
            font-size: 0.75rem;
            font-weight: 700;
            outline: none;
            width: 100%;
        }

        .search-box:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(219, 39, 119, 0.1); }

        #custom-alert { 
            position: fixed; 
            top: 24px; 
            left: 50%; 
            transform: translateX(-50%) translateY(-150%); 
            width: 85%; 
            max-width: 360px; 
            background: var(--card-bg); 
            z-index: 4000; 
            padding: 18px 24px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            opacity: 0; 
            border: 1px solid var(--border-color); 
        }
        #custom-alert.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @media (min-width: 501px) {
            body { font-size: 14px; }
            .glass-card h4 { font-size: 1.1rem; }
        }
    </style>

    <meta name="theme-color" content="#10b981">
    <link rel="manifest" href="manifest.json?v=1778158843531">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        #offline-banner { position:fixed; top:0; left:0; right:0; background:#ef4444; color:white; text-align:center; padding:5px; z-index:9999; font-weight:bold; display:none; }
    </style>
    <div id="offline-banner">MODE OFFLINE - DATA TERSIMPAN LOKAL</div>
</head>
<body>

<div id="custom-alert">
    <div id="alert-icon" class="w-11 h-11 rounded-full flex items-center justify-center bg-slate-50 text-indigo-600 text-xl">ℹ️</div>
    <div class="flex-1">
        <p id="alert-title" class="text-[10px] font-black uppercase text-slate-400">Info Sistem</p>
        <p id="alert-msg" class="text-[12px] font-bold text-slate-700"></p>
    </div>
</div>

<div id="loading-overlay" class="fixed inset-0 z-[5000] flex flex-col items-center justify-center">
    <dotlottie-player src="https://lottie.host/62f6b864-7476-4654-a690-3375f4f89d38/L6rA3UfP6z.json" speed="2" style="width: 120px; height: 120px;" loop autoplay></dotlottie-player>
    <p id="loading-text" class="text-[10px] font-black uppercase text-pink-600 tracking-widest mt-4 animate-pulse">Sinkronisasi Data...</p>
</div>

<div class="app-container">
    <div class="pink-header p-6 pt-12 pb-10 rounded-b-[45px] text-white">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-4">
                <button onclick="fetchData()" class="w-10 h-10 bg-white/20 hover:bg-white/40 backdrop-blur-md rounded-xl flex items-center justify-center">🔄</button>
                <div>
                    <h2 class="text-xl font-black uppercase leading-tight">Rekap Admin</h2>
                    <p class="text-[9px] font-bold opacity-80 uppercase tracking-widest">Manajemen Kehadiran</p>
                </div>
            </div>
            <button onclick="downloadExcel()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold shadow-lg flex items-center gap-2">
                📊 EXCEL
            </button>
        </div>

        <div class="grid grid-cols-4 gap-2">
            <div class="glass-card">
                <p class="text-[6px] font-black uppercase opacity-70 mb-1">Petugas</p>
                <h4 id="stat-total-petugas" class="text-sm font-black">0</h4>
            </div>
            <div class="glass-card">
                <p class="text-[6px] font-black uppercase opacity-70 mb-1">Masuk</p>
                <h4 id="stat-masuk" class="text-sm font-black">0</h4>
            </div>
            <div class="glass-card">
                <p class="text-[6px] font-black uppercase opacity-70 mb-1">Telat</p>
                <h4 id="stat-telat" class="text-sm font-black text-amber-300">0</h4>
            </div>
            <div class="glass-card">
                <p class="text-[6px] font-black uppercase opacity-70 mb-1">DL</p>
                <h4 id="stat-dl" class="text-sm font-black text-cyan-300">0</h4>
            </div>
        </div>
    </div>

    <div class="scrollable-content px-6 mt-6">
        <div class="mb-4 space-y-2">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Monitoring Kehadiran</h3>
            <div class="flex gap-2">
                <input type="date" id="filter-date-monitoring" onchange="renderTodayMonitoring()" class="search-box py-2 text-[10px] w-1/3">
                <input type="text" id="search-today" oninput="renderTodayMonitoring()" placeholder="Cari Nama..." class="search-box py-2 text-[10px] w-1/3">
                <select id="filter-status-monitoring" onchange="renderTodayMonitoring()" class="search-box py-2 text-[10px] w-1/3 font-bold">
                    <option value="ALL">SEMUA</option>
                    <option value="HADIR">HADIR</option>
                    <option value="BELUM">BELUM</option>
                    <option value="DL">DL</option>
                </select>
            </div>
        </div>
        
        <div class="rekap-wrapper shadow-sm overflow-hidden mb-8">
            <table class="rekap-table">
                <colgroup>
                    <col style="width: 50%;">
                    <col style="width: 50%;">
                </colgroup>
                <thead>
                    <tr>
                        <th>NAMA PETUGAS</th>
                        <th>STATUS DETAIL</th>
                    </tr>
                </thead>
                <tbody id="today-monitoring-body"></tbody>
            </table>
        </div>

        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Riwayat Bulanan</h3>
        
        <div class="space-y-2 mb-4">
            <div class="flex gap-2">
                <div class="w-1/2 relative">
                   <input type="date" id="filter-date-history" onchange="renderAdminRekap()" class="search-box py-2 text-[10px] w-full">
                   <p class="text-[7px] text-slate-400 mt-1 font-bold italic">*Kosongkan untuk semua tgl</p>
                </div>
                <input type="text" id="search-history" oninput="renderAdminRekap()" placeholder="Cari Nama..." class="search-box py-2 text-[10px] w-1/2">
            </div>
            
            <div class="flex gap-2">
                <select id="filter-bulan" onchange="renderAdminRekap()" class="w-full bg-white border border-slate-200 p-3 rounded-xl text-[11px] font-bold text-slate-700 outline-none">
                    <option value="01">JANUARI</option>
                    <option value="02">FEBRUARI</option>
                    <option value="03">MARET</option>
                    <option value="04">APRIL</option>
                    <option value="05">MEI</option>
                    <option value="06">JUNI</option>
                    <option value="07">JULI</option>
                    <option value="08">AGUSTUS</option>
                    <option value="09">SEPTEMBER</option>
                    <option value="10">OKTOBER</option>
                    <option value="11">NOVEMBER</option>
                    <option value="12">DESEMBER</option>
                </select>
                <select id="filter-tahun" onchange="renderAdminRekap()" class="bg-white border border-slate-200 p-3 rounded-xl text-[11px] font-bold text-slate-700 outline-none">
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                </select>
            </div>
            
            <select id="filter-status" onchange="renderAdminRekap()" class="w-full bg-white border border-slate-200 p-3 rounded-xl text-[11px] font-bold text-slate-700 outline-none">
                <option value="ALL">SEMUA STATUS</option>
                <option value="TEPAT WAKTU">TEPAT WAKTU</option>
                <option value="TERLAMBAT">TERLAMBAT</option>
                <option value="DL">DINAS LUAR (DL)</option>
            </select>
        </div>

        <div class="rekap-wrapper shadow-sm overflow-hidden">
            <table class="rekap-table" id="admin-table">
                <colgroup>
                    <col style="width: 35%;">
                    <col style="width: 25%;">
                    <col style="width: 20%;">
                    <col style="width: 20%;">
                </colgroup>
                <thead>
                    <tr>
                        <th>NAMA PETUGAS</th>
                        <th>TANGGAL</th>
                        <th>JAM ABSEN</th>
                        <th>KET.</th>
                    </tr>
                </thead>
                <tbody id="admin-rekap-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbya9Unun4FbOiyW7jvJSHqfTlxy99FcLPeg8vQQ2FQSKgQxhL-zwEr_qvFyd2IVLWXf/exec";
    
    let state = {
        logs: [],
        officers: []
    };

    function showAlert(title, msg) {
        document.getElementById('alert-title').innerText = title;
        document.getElementById('alert-msg').innerText = msg;
        const alert = document.getElementById('custom-alert');
        alert.classList.add('show');
        setTimeout(() => alert.classList.remove('show'), 4000);
    }

    function showLoading(show) { 
        const overlay = document.getElementById('loading-overlay');
        if(show) {
            overlay.style.display = 'flex';
            overlay.style.opacity = '1';
        } else {
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 400);
        }
    }

    function formatTime(rawTime) {
        if (!rawTime) return "-";
        try {
            if (typeof rawTime === 'string' && /^\d{2}:\d{2}$/.test(rawTime)) return rawTime;
            const date = new Date(rawTime);
            if (!isNaN(date.getTime())) {
                return date.toLocaleTimeString('id-ID', { 
                    hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Makassar' 
                }).replace('.', ':');
            }
        } catch (e) {}
        return rawTime;
    }

    async function fetchData() {
        showLoading(true);
        try {
            const response = await fetch(`${WEB_APP_URL}?action=getData`);
            const res = await response.json();
            state.logs = res.logs;
            state.officers = res.officers;
            
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            
            document.getElementById('filter-date-monitoring').value = todayStr;
            document.getElementById('filter-date-history').value = ""; 
            
            document.getElementById('filter-bulan').value = (now.getMonth() + 1).toString().padStart(2, '0');
            document.getElementById('filter-tahun').value = now.getFullYear().toString();
            
            renderTodayMonitoring();
            renderAdminRekap();
            setTimeout(() => showLoading(false), 500);
        } catch (e) {
            showAlert("Error", "Gagal mengambil data.");
            showLoading(false);
        }
    }

    function renderTodayMonitoring() {
        const tbody = document.getElementById('today-monitoring-body');
        const searchTerm = document.getElementById('search-today').value.toLowerCase();
        const selectedDateVal = document.getElementById('filter-date-monitoring').value;
        const filterStatus = document.getElementById('filter-status-monitoring').value;
        
        let targetDateStr = "";
        if (selectedDateVal) {
            const [y, m, d] = selectedDateVal.split('-');
            targetDateStr = `${d}/${m}/${y}`;
        }

        const uniqueOfficers = [...new Set(state.officers)];
        const logsOnDate = state.logs.filter(l => l.date === targetDateStr);
        
        let htmlRows = "";

        uniqueOfficers.forEach(name => {
            const personalLogs = logsOnDate.filter(l => l.name === name);
            const isDL = personalLogs.some(l => l.type === 'DL');
            const hasMasuk = personalLogs.some(l => l.type === 'MASUK');
            const hasPulang = personalLogs.some(l => l.type === 'PULANG');

            if (filterStatus === "HADIR" && !hasMasuk && !hasPulang && !isDL) return;
            if (filterStatus === "BELUM" && (hasMasuk || hasPulang || isDL)) return;
            if (filterStatus === "DL" && !isDL) return;
            if (searchTerm && !name.toLowerCase().includes(searchTerm)) return;

            let badgeClass = "badge-absent";
            let mColor = "text-rose-500", pColor = "text-rose-500";
            let mLab = "Belum", pLab = "Belum";

            if (isDL) {
                badgeClass = "badge-dl";
                mColor = pColor = "text-cyan-600";
                mLab = pLab = "DL";
            } else {
                if (hasMasuk) { badgeClass = "badge-present"; mColor = "text-emerald-600"; mLab = "Absen"; }
                if (hasPulang) { badgeClass = "badge-present"; pColor = "text-emerald-600"; pLab = "Absen"; }
            }

            htmlRows += `
                <tr>
                    <td class="font-bold text-slate-700 truncate">${name}</td>
                    <td>
                        <div class="status-badge ${badgeClass} p-2">
                            <div class="flex justify-between"><span>MASUK:</span><span class="${mColor} font-black">${mLab}</span></div>
                            <div class="flex justify-between"><span>PULANG:</span><span class="${pColor} font-black">${pLab}</span></div>
                        </div>
                    </td>
                </tr>
            `;
        });

        tbody.innerHTML = htmlRows || '<tr><td colspan="2" class="text-center py-10 text-slate-300 font-bold">Tidak ada data</td></tr>';
        document.getElementById('stat-total-petugas').innerText = uniqueOfficers.length;
    }

    function renderAdminRekap() {
        const tbody = document.getElementById('admin-rekap-body');
        const filterBulan = document.getElementById('filter-bulan').value;
        const filterTahun = document.getElementById('filter-tahun').value;
        const filterStatus = document.getElementById('filter-status').value;
        const filterDate = document.getElementById('filter-date-history').value;
        const searchTerm = document.getElementById('search-history').value.toLowerCase();
        
        let targetDateFormatted = "";
        if (filterDate) {
            const [y, m, d] = filterDate.split('-');
            targetDateFormatted = `${d}/${m}/${y}`;
        }

        let countMasuk = 0, countTelat = 0, countDL = 0;
        const grouped = {};

        state.logs.forEach(l => {
            const parts = l.date.split('/');
            if (parts[1] !== filterBulan || parts[2] !== filterTahun) return;

            const key = `${l.date}_${l.name}`;
            if (!grouped[key]) {
                grouped[key] = { name: l.name, date: l.date, masuk: "-", pulang: "-", status: "-" };
            }
            
            const time = formatTime(l.time);
            if (l.type === "MASUK") {
                grouped[key].masuk = time;
                grouped[key].status = l.status;
            } else if (l.type === "PULANG") {
                grouped[key].pulang = time;
            } else if (l.type === "DL") {
                grouped[key].status = "DL";
            }
        });

        let results = Object.values(grouped).sort((a, b) => {
            const dateA = a.date.split('/').reverse().join('');
            const dateB = b.date.split('/').reverse().join('');
            return dateB.localeCompare(dateA);
        });

        results = results.filter(r => {
            const matchSearch = r.name.toLowerCase().includes(searchTerm);
            const matchDate = !filterDate || r.date === targetDateFormatted;
            const matchStatus = filterStatus === "ALL" || 
                               (filterStatus === "DL" && r.status === "DL") ||
                               (filterStatus === "TERLAMBAT" && r.status.includes("TERLAMBAT")) ||
                               (filterStatus === "TEPAT WAKTU" && r.status.includes("TEPAT WAKTU"));
            
            if (matchSearch && matchStatus && matchDate) {
                if (r.status.includes("MASUK") || r.status.includes("WAKTU") || r.status.includes("LAMBAT")) countMasuk++;
                if (r.status.includes("TERLAMBAT")) countTelat++;
                if (r.status === "DL") countDL++;
                return true;
            }
            return false;
        });

        tbody.innerHTML = results.length > 0 ? results.map(r => {
            let statusColor = "text-emerald-500";
            if (r.status.includes("TERLAMBAT")) statusColor = "text-amber-500";
            if (r.status === "DL") statusColor = "text-cyan-500";
            const jamDisplay = r.status === "DL" ? "DL" : `${r.masuk} - ${r.pulang}`;

            return `
                <tr>
                    <td class="font-bold text-slate-700 truncate">${r.name}</td>
                    <td class="text-slate-600 font-medium">${r.date}</td>
                    <td class="font-mono text-[8px] text-slate-600">${jamDisplay}</td>
                    <td><span class="${statusColor} font-black uppercase text-[7px]">${r.status}</span></td>
                </tr>
            `;
        }).join('') : '<tr><td colspan="4" class="text-center py-20 text-slate-300 font-bold uppercase">Data tidak ditemukan</td></tr>';

        document.getElementById('stat-masuk').innerText = countMasuk;
        document.getElementById('stat-telat').innerText = countTelat;
        document.getElementById('stat-dl').innerText = countDL;
    }

    function downloadExcel() {
        const table = document.getElementById('admin-table');
        const wb = XLSX.utils.table_to_book(table, { sheet: "Rekap", raw: true });
        const b = document.getElementById('filter-bulan').options[document.getElementById('filter-bulan').selectedIndex].text;
        XLSX.writeFile(wb, `REKAP_GARDENA_${b}.xlsx`);
    }

    window.onload = fetchData;
</script>

    <script>
      const P_CONFIG = { 
        gps: true, 
        sync: true 
      };
      
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js?v=1778158843531');
      }

      async function saveAbsensi(data) {
        let queue = JSON.parse(localStorage.getItem('absensi_queue') || '[]');
        queue.push({ ...data, timestamp: new Date().toISOString() });
        localStorage.setItem('absensi_queue', JSON.stringify(queue));
        
        if ('serviceWorker' in navigator && 'SyncManager' in window) {
          const registration = await navigator.serviceWorker.ready;
          try {
            await registration.sync.register('sync-absensi');
          } catch (e) {
            checkConnectionAndSync();
          }
        } else {
          checkConnectionAndSync();
        }
      }

      function checkConnectionAndSync() {
        if (navigator.onLine) {
          const queue = JSON.parse(localStorage.getItem('absensi_queue') || '[]');
          if (queue.length > 0) {
            console.log('Online! Mengirim ' + queue.length + ' data tertunda...');
            document.getElementById('offline-banner').style.display = 'none';
          }
        } else {
          document.getElementById('offline-banner').style.display = 'block';
        }
      }

      window.addEventListener('online', checkConnectionAndSync);
      window.addEventListener('load', checkConnectionAndSync);
      window.addEventListener('offline', () => document.getElementById('offline-banner').style.display='block');
    </script>
</body>
</html>
